name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: lint + security audit + tests
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Audit & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Provide a safe dummy secret so assertRequiredEnv passes in test mode.
          # Real secrets are never stored in CI; tests should mock external calls.
          JWT_SECRET: ci-test-secret-that-is-long-enough-for-32-char-minimum

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: lint + security audit + build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Audit & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Docker: build both images (no push on PR)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t jobhub-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t jobhub-frontend:${{ github.sha }} ./frontend

